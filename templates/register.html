<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Students | Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Color Palette --- */
        :root {
            --color-primary: #10b981; /* Emerald Green Accent */
            --color-primary-dark: #059669;
            --color-background: #f5f7fa; /* Soft Light Gray Background */
            --color-surface: #ffffff; /* Pure White Surfaces */
            --color-text-dark: #1e293b; /* Dark Navy for Headings */
            --color-text-light: #64748b; /* Soft Gray for Subtext */
            --shadow-base: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        /* --- Global Styles & Typography --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            margin: 0;
            padding: 0;
            color: var(--color-text-dark);
            min-height: 100vh;
        }

        /* --- Horizontal Navigation Bar (Sleek and Fixed) --- */
        .navbar {
            background-color: var(--color-surface);
            padding: 0 40px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar h2 {
            color: var(--color-text-dark);
            font-weight: 600;
            margin: 15px 0;
            font-size: 1.4em;
        }

        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav-links a {
            display: block;
            padding: 20px 18px;
            text-decoration: none;
            color: var(--color-text-light);
            font-size: 0.95em;
            font-weight: 500;
            transition: color 0.3s, background-color 0.3s;
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        /* Highlight the active page */
        .nav-links a.active {
            color: var(--color-primary);
            border-bottom: 3px solid var(--color-primary);
            padding-bottom: 17px;
        }

        /* --- Main Content Area --- */
        .main-content {
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
            color: var(--color-text-dark);
            font-weight: 700;
            font-size: 2em;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }
        
        /* --- Registration Form Card Styling --- */
        .form-card {
            background-color: var(--color-surface);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow-base);
            border: 1px solid #e2e8f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1; /* Spans both columns */
        }

        label {
            font-weight: 600;
            color: var(--color-text-dark);
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="number"],
        select,
        input[type="file"] {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            color: var(--color-text-dark);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        input[type="file"]:focus {
            border-color: var(--color-primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        /* Custom style for file input button area */
        input[type="file"] {
            background-color: var(--color-background);
            padding: 10px;
        }

        /* --- Submit Button --- */
        .submit-btn {
            background-color: var(--color-primary);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
        }
        
        /* --- Responsiveness --- */
        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }
            .navbar {
                padding: 0 20px;
            }
            .form-grid {
                grid-template-columns: 1fr; /* Stack columns vertically on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Admin Panel</h2>
        <ul class="nav-links">
            <li><a href="/admin">Dashboard</a></li>
            <li><a href="/profile">Profile</a></li>
            <li><a href="/">Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="header">Register New Student</h1>

        <div class="form-card">
            <form action="/register" method="POST" enctype="multipart/form-data">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="e.g., Jane Doe">
                    </div>

                    <div class="form-group">
                        <label for="roll_no">Roll Number / ID</label>
                        <input type="text" id="roll_no" name="roll_no" required placeholder="e.g., U250943">
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="CS">Computer Science</option>
                            <option value="EE">Electrical Engineering</option>
                            <option value="ME">Mechanical Engineering</option>
                            <option value="CE">Civil Engineering</option>
                            <option value="EC">Electronics & Communication</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="year">Academic Year</label>
                        <select id="year" name="year" required>
                            <option value="" disabled selected>Select Year</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="image">Student Photo (for Face Recognition V2)</label>
                        <input type="file" id="image" name="image" accept="image/*" required>
                        <p style="font-size: 0.8em; color: var(--color-text-light); margin-top: -5px;">Upload a clear, passport-style image.</p>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Register Student</button>
            </form>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <a href="/admin" style="color: var(--color-text-light); text-decoration: none; font-weight: 500;">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
